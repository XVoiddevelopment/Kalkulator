<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Purple Calculator</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0d0b1f;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .calculator {
        background: #15122b;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 0 25px rgba(128, 0, 255, 0.4);
        width: 320px;
    }

    .display {
        width: 100%;
        height: 60px;
        background: #0d0b1f;
        color: #c084fc;
        font-size: 24px;
        text-align: right;
        padding: 10px;
        border: none;
        border-radius: 10px;
        margin-bottom: 15px;
        box-sizing: border-box;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    button {
        padding: 15px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #1f1b3a;
        color: #e9d5ff;
        transition: 0.2s;
    }

    button:hover {
        background: #7e22ce;
    }

    .operator {
        background: #6b21a8;
    }

    .operator:hover {
        background: #9333ea;
    }

    .equal {
        grid-column: span 2;
        background: #9333ea;
    }

    .equal:hover {
        background: #a855f7;
    }

    .clear {
        background: #ef4444;
    }

    .clear:hover {
        background: #dc2626;
    }
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" class="display" disabled>

    <div class="buttons">
        <button onclick="clearDisplay()" class="clear">C</button>
        <button onclick="deleteLast()">DEL</button>
        <button onclick="append('%')">%</button>
        <button onclick="append('/')">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('*')">×</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('-')">−</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('+')">+</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="calculate()" class="equal">=</button>

        <!-- Scientific -->
        <button onclick="append('Math.sin(')">sin</button>
        <button onclick="append('Math.cos(')">cos</button>
        <button onclick="append('Math.tan(')">tan</button>
        <button onclick="append('Math.sqrt(')">√</button>

        <button onclick="append('Math.log(')">log</button>
        <button onclick="append('Math.pow(')">xʸ</button>
        <button onclick="append('Math.PI')">π</button>
        <button onclick="append('Math.E')">e</button>
    </div>
</div>

<script>
    const display = document.getElementById("display");

    function append(value) {
        display.value += value;
    }

    function clearDisplay() {
        display.value = "";
    }

    function deleteLast() {
        display.value = display.value.slice(0, -1);
    }

    function calculate() {
        try {
            display.value = eval(display.value);
        } catch {
            display.value = "Error";
        }
    }
</script>

</body>
</html>
